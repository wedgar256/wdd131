<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Uganda - The Pearl of Africa">
  <meta name="author" content="Wanyama Edgar">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Uganda - The Pearl of Africa</title>

  <link rel="stylesheet" href="styles/place.css">
  <script src="scripts/place.js" defer></script>
</head>

<body>

<header>
  <h1>Uganda 🇺🇬</h1>
</header>

<main>

  <!-- HERO -->
  <section class="hero">
    <picture>
      <source type="image/webp" srcset="images/uganda-small.webp">
      <img src="images/uganda-small.jpg" alt="Beautiful landscape of Uganda">
    </picture>
  </section>

  <!-- DATA -->
  <section class="data">
    <h2>Country Data</h2>
    <ul>
      <li><strong>Capital:</strong> Kampala</li>
      <li><strong>Population:</strong> 45 Million+</li>
      <li><strong>Language:</strong> English, Luganda</li>
      <li><strong>Currency:</strong> Ugandan Shilling</li>
    </ul>
  </section>

  <!-- WEATHER -->
  <section class="weather">
    <h2>Weather ⛅</h2>
    <p>Temperature: <span id="temp"></span> °C</p>
    <p>Wind Speed: <span id="wind"></span> km/h</p>
    <p>Wind Chill: <span id="chill"></span></p>
  </section>

</main>

<footer>
  <p>&copy; <span id="year"></span> Wanyama Edgar | Uganda</p>
  <p id="lastModified"></p>
</footer>

</body>
</html>
